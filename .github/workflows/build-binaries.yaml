name: Build Python executables (Linux + macOS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ubuntu-22_04-python-3_10:
    name: Build Linux binary
    runs-on: ubuntu-22.04
    env:
      PYTHON_VERSION: '3.10'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller
      - name: Build (PyInstaller --onefile)
        run: |
          pyinstaller --onefile cmdv2-main.py --name cmdv2-main-ubuntu-22.04-python-3.10
          pyinstaller --onefile ssh-proxy.py --name ssh-proxy-ubuntu-22.04-python-3.10
          pyinstaller --onefile sbit_maclin.py --name sbit_maclin-ubuntu-22.04-python-3.10
          pyinstaller --onefile tunnel-mini.py --name tunnel-mini-ubuntu-22.04-python-3.10
      - name : Upload Linux binary to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Release binaries
          files: dist/*

  build-macos-latest-python-3_11:
    name: Build macOS binary
    runs-on: macos-latest
    env:
      PYTHON_VERSION: '3.11'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            macos-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller
      - name: Build (PyInstaller --onefile)
        run: |
          pyinstaller --onefile cmdv2-main.py --name cmdv2-main-macos-latest-python-3.11
          pyinstaller --onefile ssh-proxy.py --name ssh-proxy-macos-latest-python-3.11
          pyinstaller --onefile sbit_maclin.py --name sbit_maclin-macos-latest-python-3.11
          pyinstaller --onefile tunnel-mini.py --name tunnel-mini-macos-latest-python-3.11
          # macOS: if GUI app, add --windowed
      - name : Upload MacOS binary to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Release binaries
          files: dist/*